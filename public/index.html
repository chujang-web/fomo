<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>FutureWealth FOMO & RETIRE</title>
<style>
html,body{margin:0;min-height:100%;background:#050914;color:#f8fafc;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Noto Sans KR",sans-serif;}
body{display:flex;align-items:center;justify-content:center;padding:24px;box-sizing:border-box;}
.wrap{max-width:980px;width:100%;}
.logo{width:56px;height:56px;border-radius:18px;background:rgba(0,255,136,.1);border:1px solid rgba(0,255,136,.28);display:flex;align-items:center;justify-content:center;font-size:32px;margin-bottom:18px;}
h1{font-size:42px;line-height:1.05;margin:0 0 10px;font-weight:950;letter-spacing:-.04em;}
p{color:#94a3b8;margin:0 0 28px;font-size:16px;line-height:1.65;}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:18px;}
.card{display:block;text-decoration:none;color:#f8fafc;background:rgba(19,25,38,.78);border:1px solid rgba(255,255,255,.08);border-radius:24px;padding:26px;min-height:220px;box-shadow:0 20px 80px rgba(0,0,0,.22);transition:.18s ease;}
.card:hover{transform:translateY(-3px);border-color:rgba(0,255,136,.38);box-shadow:0 24px 90px rgba(0,255,136,.08);}
.badge{display:inline-flex;align-items:center;border-radius:999px;padding:7px 11px;font-size:12px;font-weight:900;margin-bottom:18px;}
.green{background:#00ff88;color:#050914}.dark{background:rgba(255,255,255,.08);color:#e2e8f0;border:1px solid rgba(255,255,255,.1)}
.card h2{margin:0 0 10px;font-size:26px;letter-spacing:-.03em}.card p{margin:0 0 22px;font-size:14px}.go{font-weight:950;color:#00ff88}.footer{margin-top:22px;font-size:12px;color:#64748b}
@media(max-width:760px){h1{font-size:32px}.grid{grid-template-columns:1fr}.card{min-height:auto}.wrap{max-width:520px}}
</style>
</head>
<body>
<main class="wrap">
  <div class="logo">🦜</div>
  <h1>FutureWealth</h1>
  <p>초보자는 “그때 투자했다면?”을, 고급 사용자는 “앞으로 투자하면 은퇴 후 어떤 미래가 펼쳐질지”를 시뮬레이션합니다.</p>
  <section class="grid">
    <a class="card" href="./beginner.html">
      <span class="badge green">초보용</span>
      <h2>그때 투자했다면?</h2>
      <p>과거 특정 시점에 투자했다면 현재 얼마가 되었을지 빠르게 확인합니다.</p>
      <span class="go">FOMO 계산기 시작 →</span>
    </a>
    <a class="card" href="./advanced.html">
      <span class="badge dark">고급형</span>
      <h2>앞으로 투자한다면?</h2>
      <p>생년월, 은퇴 나이, 연금, 인출률을 반영해 미래 은퇴 현금흐름을 계산합니다.</p>
      <span class="go">RETIRE 시뮬레이터 시작 →</span>
    </a>
  </section>
  <div class="footer">v1.3.0 · 한국어 / Română / English 지원</div>
</main>
<script src="./js/i18n.js"></script>
</body>
</html>
